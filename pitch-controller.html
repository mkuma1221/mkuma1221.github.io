<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kepler Solver Project</title>

  <!-- Cayman theme styling -->
  <link rel="stylesheet" href="https://pages-themes.github.io/cayman/assets/css/style.css">

  <style>
    body {
      font-family: sans-serif;
      line-height: 1.7;
      color: #333;
    }

    .page-header {
      background-image: url('images/HOR.jpg');
      background-size: cover;
      background-position: center;
    }

    .content-wrapper {
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section-title {
      color: #000080;
      margin-top: 35px;
      margin-bottom: 10px;
    }

    .divider {
      height: 2px;
      background: #cfcfcf;
      margin: 15px 0 25px 0;
    }

    .image-box {
      text-align: center;
      margin-top: 25px;
      margin-bottom: 25px;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
    }

    ul {
      padding-left: 24px;
    }

    li {
      margin-bottom: 18px;
    }

    .equation {
      text-align: center;
      margin: 30px 0;
    }

    .equation img {
      max-width: 400px;
    }

    .sub-list {
      margin-top: 10px;
    }
  </style>
