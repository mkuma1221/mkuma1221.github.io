<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kepler Solver Project</title>

  <link rel="stylesheet" href="https://pages-themes.github.io/cayman/assets/css/style.css">

  <style>
    body {
      font-family: sans-serif;
      line-height: 1.7;
      color: #333;
    }

    .page-header {
      position: relative; /* Enables absolute positioning for the home button */
      background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), url('images/citation550.jpg');
      background-size: cover;
      background-position: center;
      padding: 80px 20px;
      text-align: center;
    }

    /* --- Home Button Styling --- */
    .home-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      text-decoration: none;
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(5px); /* Creates a clean frosted-glass look */
      transition: all 0.2s ease-in-out;
    }

    .home-btn:hover {
      background-color: rgba(255, 255, 255, 0.35);
      color: #ffffff;
      transform: translateY(-2px);
    }

    .home-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    /* -------------------------- */

    .page-header h1 {
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      margin: 0;
    }

    .content-wrapper {
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section-title {
      color: #000080;
      margin-top: 35px;
      margin-bottom: 10px;
    }

    .divider {
      height: 2px;
      background: #cfcfcf;
      margin: 15px 0 25px 0;
    }

    .image-box {
      text-align: center;
      margin-top: 25px;
      margin-bottom: 25px;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
    }

    ul {
      padding-left: 24px;
    }

    li {
      margin-bottom: 18px;
    }

    .equation {
      text-align: center;
      margin: 30px 0;
    }

    .equation img {
      max-width: 400px;
    }

    .sub-list {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <header class="page-header">
    <a href="index.html" class="home-btn">
      <svg viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      Home
    </a>

    <div class="content-wrapper">
      <h1>Pitch Controller Model</h1>
    </div>
  </header>

</body>
</html>
